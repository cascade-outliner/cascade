name: Coolify Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Get active deployment UUID for PR
        id: get-deployment
        run: |
            # Fetch the application's ongoing deployments
            RESPONSE=$(curl -s -X GET \
              "${{ secrets.COOLIFY_URL }}/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}/deployments" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              -H "Content-Type: application/json")
            
            # Print the raw response to the logs for debugging
            echo "Raw API Response: $RESPONSE"
            
            # Safely extract the UUID, checking if it's wrapped in '.data' or if it's a direct array
            # The '?' prevents jq from throwing an error if the path doesn't exist
            DEPLOYMENT_UUID=$(echo "$RESPONSE" | jq -r '.data[0]?.deployment_uuid? // .[0]?.deployment_uuid? // empty')
            
            if [ -z "$DEPLOYMENT_UUID" ] || [ "$DEPLOYMENT_UUID" = "null" ]; then
              echo "No active deployments found for this application."
              exit 1
            fi
            
            echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"

      - name: Poll deployment status
        run: |
          UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=10

          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS_RESPONSE=$(curl -s -X GET \
              "${{ secrets.COOLIFY_URL }}/api/v1/deployments/$UUID" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")

            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')
            echo "Attempt $i/$MAX_ATTEMPTS - Status: $STATUS"

            case "$STATUS" in
              finished)
                echo "✅ Deployment succeeded"
                exit 0
                ;;
              failed|cancelled)
                echo "❌ Deployment $STATUS"
                echo "$STATUS_RESPONSE" | jq .
                exit 1
                ;;
              *)
                sleep $SLEEP_SECONDS
                ;;
            esac
          done

          echo "⏱️ Timed out waiting for deployment"
          exit 1