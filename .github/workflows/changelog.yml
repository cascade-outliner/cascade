name: Check Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  pull-requests: read

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check for changelog entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          LABELS=$(gh api "repos/$REPO/pulls/$PR_NUMBER" -q '.labels[].name')
          if echo "$LABELS" | grep -qx "skip-changelog"; then
            echo "Skipping changelog check ('skip-changelog' label present)."
            exit 0
          fi

          FILES=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate -q '.[].filename')
          if ! echo "$FILES" | grep -q "^apps/app/"; then
            echo "This PR doesn't touch apps/app, skipping changelog check."
            exit 0
          fi

          if echo "$FILES" | grep -qx "CHANGELOG.md"; then
            echo "CHANGELOG.md was updated."
          else
            echo "This PR doesn't update CHANGELOG.md. Add an entry describing the user-facing change, or apply the 'skip-changelog' label if this PR has no user-facing change."
            exit 1
          fi
